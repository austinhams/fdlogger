services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fdlogger
      POSTGRES_USER: fdlogger
      POSTGRES_PASSWORD: fdlogger
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fdlogger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/austinhams/fdlogger:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://fdlogger:fdlogger@db:5432/fdlogger
      PORT: "3000"
    ports:
      - "3000:3000"
      - "2237:2237/udp"
    depends_on:
      db:
        condition: service_healthy

  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - app

volumes:
  pgdata:
  npm_data:
  npm_letsencrypt:
