services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: fdlogger
      POSTGRES_USER: fdlogger
      POSTGRES_PASSWORD: fdlogger
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://fdlogger:fdlogger@db:5432/fdlogger
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:
